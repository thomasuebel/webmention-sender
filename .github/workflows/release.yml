name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, simplexml
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Extract changelog notes
        id: changelog
        run: |
          notes=$(awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{if(flag) exit} flag{print}' CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Release v$VERSION"
          git push origin main

      - name: Build release zip
        run: |
          mkdir -p dist/webmention-sender
          cp webmention-sender.php config.example.php README.md LICENSE dist/webmention-sender/
          cp -r src dist/webmention-sender/src
          cd dist
          zip -r ../webmention-sender-v${VERSION}.zip webmention-sender/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          body: ${{ steps.changelog.outputs.NOTES }}
          files: webmention-sender-v${{ env.VERSION }}.zip
