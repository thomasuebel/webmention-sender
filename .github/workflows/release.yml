name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, simplexml
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build release zip
        run: |
          mkdir -p dist/webmention-sender
          cp webmention-sender.php webmention-cron.php config.example.php README.md LICENSE dist/webmention-sender/
          cp -r src dist/webmention-sender/src
          cd dist
          zip -r ../webmention-sender-v${VERSION}.zip webmention-sender/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          files: webmention-sender-v${{ env.VERSION }}.zip
